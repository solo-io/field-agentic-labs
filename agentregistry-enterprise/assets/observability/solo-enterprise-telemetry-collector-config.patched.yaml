apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    meta.helm.sh/release-name: kagent-mgmt
    meta.helm.sh/release-namespace: kagent
  labels:
    app.kubernetes.io/managed-by: Helm
  name: solo-enterprise-telemetry-collector-config
  namespace: kagent
data:
  relay: "extensions:\n  health_check:\n    endpoint: ${env:MY_POD_IP}:13133\nexporters:\n  clickhouse/k8sobjects:\n    endpoint: tcp://${file:/etc/clickhouse-config/address}:${file:/etc/clickhouse-config/port}?dial_timeout=10s&enable_json_type=1\n    json: true\n    database: ${file:/etc/clickhouse-config/database}\n    username: ${file:/etc/clickhouse-config/username}\n    password: ${file:/etc/clickhouse-config/password}\n    async_insert: true\n    ttl: 2160h\n    compress: lz4\n    create_schema: false\n    logs_table_name: otel_k8sobjects_json\n    timeout: 10s\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\n  clickhouse/telemetry:\n    endpoint: tcp://${file:/etc/clickhouse-config/address}:${file:/etc/clickhouse-config/port}?dial_timeout=10s&enable_json_type=1\n    json: true\n    database: ${file:/etc/clickhouse-config/database}\n    username: ${file:/etc/clickhouse-config/username}\n    password: ${file:/etc/clickhouse-config/password}\n    async_insert: true\n    ttl: 2160h\n    compress: lz4\n    create_schema: false\n    logs_table_name: otel_logs_json\n    traces_table_name: otel_traces_json\n    timeout: 10s\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\n  clickhouse/metrics:\n    endpoint: tcp://${file:/etc/clickhouse-config/address}:${file:/etc/clickhouse-config/port}?dial_timeout=10s&enable_json_type=1\n    json: true\n    database: ${file:/etc/clickhouse-config/database}\n    username: ${file:/etc/clickhouse-config/username}\n    password: ${file:/etc/clickhouse-config/password}\n    async_insert: true\n    ttl: 2160h\n    compress: lz4\n    create_schema: false\n    timeout: 10s\n    metrics_tables:\n      gauge:\n        name: otel_metrics_gauge\n      sum:\n        name: otel_metrics_sum\n      summary:\n        name: otel_metrics_summary\n      histogram:\n        name: otel_metrics_histogram\n      exponential_histogram:\n        name: otel_metrics_exp_histogram\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\n  otlp/agentregistry:\n    endpoint: agentregistry-enterprise-telemetry-collector.agentregistry-system.svc.cluster.local:4317\n    tls:\n      insecure: true\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\nprocessors:\n  batch:\n    send_batch_max_size: 3000\n    send_batch_size: 2000\n    timeout: 600ms\n  memory_limiter:\n    check_interval: 1s\n    limit_percentage: 85\n    spike_limit_percentage: 10\n  resource/cluster_context:\n    attributes:\n    - key: cluster_name\n      action: insert\n      value: mgmt-cluster\n  attributes/k8sobjects:\n    actions:\n    - key: k8sobjects\n      value: true\n      action: upsert\n  k8sattributes:\n    auth_type: serviceAccount\n    passthrough: false\n    extract:\n      metadata:\n      - k8s.pod.name\n      - k8s.pod.uid\n      - k8s.deployment.name\n      - k8s.daemonset.name\n      - k8s.namespace.name\n      - k8s.node.name\n      - k8s.pod.start_time\n    pod_association:\n    - sources:\n      - from: resource_attribute\n        name: k8s.pod.ip\n    - sources:\n      - from: resource_attribute\n        name: k8s.pod.uid\n    - sources:\n      - from: connection\n  filter/genai:\n    traces:\n      span:\n      - not(IsMatch(instrumentation_scope.name, \"^gcp\\\\.vertex\\\\.agent$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.openai\\\\.v1$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.anthropic$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.google-generativeai$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.ollama$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.vertexai$\") or IsMatch(instrumentation_scope.name, \"^langsmith$\") or IsMatch(instrumentation_scope.name,\
    \ \"^kagent-tools$\") or IsMatch(instrumentation_scope.name, \"^kagent-tools/mcp$\") or IsMatch(instrumentation_scope.name, \"^agentgateway$\"))\n  filter/istio:\n    error_mode: ignore\n    traces:\n      span:\n      - not(IsMatch(instrumentation_scope.name, \"^envoy\") or IsMatch(instrumentation_scope.name, \"^ztunnel\"))\n  filter/istio_metrics:\n    metrics:\n      include:\n        match_type: strict\n        metric_names:\n        - istio_requests_total\n        - istio_request_duration_milliseconds\n        - istio_tcp_sent_bytes_total\n        - istio_tcp_received_bytes_total\n        - istio_tcp_connections_opened_total\n        - istio_tcp_connections_failed_total\n        - envoy_cluster_membership_healthy\n        - envoy_cluster_membership_total\n        - envoy_cluster_outlier_detection_ejections_active\n        - istio_outlier_detection_endpoints\n        - istio_outlier_detection_endpoints_unhealthy\n        - pilot_proxy_convergence_time\n        - pilot_info\n        - pilot_xds_pushes\n        - pilot_xds_push_time\n  transform/health_metrics:\n    metric_statements:\n    - context: datapoint\n      conditions:\n      - metric.name == \"envoy_cluster_membership_healthy\" or metric.name == \"envoy_cluster_membership_total\" or metric.name == \"envoy_cluster_outlier_detection_ejections_active\"\n      statements:\n      - set(attributes[\"reporter_workload\"], resource.attributes[\"k8s.deployment.name\"]) where resource.attributes[\"k8s.deployment.name\"] != nil\n      - set(attributes[\"reporter_namespace\"], resource.attributes[\"k8s.namespace.name\"])\n      - set(attributes[\"reporter_cluster\"], resource.attributes[\"cluster_name\"])\n    - context: datapoint\n      conditions:\n      - metric.name == \"istio_outlier_detection_endpoints\" or metric.name == \"istio_outlier_detection_endpoints_unhealthy\"\n      statements:\n      - set(attributes[\"reporter_workload\"], resource.attributes[\"k8s.daemonset.name\"]) where resource.attributes[\"k8s.daemonset.name\"] != nil\n      - set(attributes[\"reporter_namespace\"], resource.attributes[\"k8s.namespace.name\"])\n      - set(attributes[\"reporter_cluster\"], resource.attributes[\"cluster_name\"])\nreceivers:\n  otlp/remote:\n    protocols:\n      grpc:\n        endpoint: 0.0.0.0:4316\n        max_recv_msg_size_mib: 32\n  otlp/local:\n    protocols:\n      grpc:\n        endpoint: 0.0.0.0:4317\n        max_recv_msg_size_mib: 32\n  prometheus:\n    config:\n      global:\n        evaluation_interval: 1m\n        scrape_interval: 15s\n        scrape_timeout: 15s\n      scrape_configs:\n      - job_name: istiod\n        honor_labels: true\n        kubernetes_sd_configs:\n        - role: pod\n        relabel_configs:\n        - action: keep\n          regex: pilot|istiod\n          source_labels:\n          - __meta_kubernetes_pod_label_istio\n        - action: keep\n          regex: true\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n        - action: replace\n          regex: (https?)\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_scheme\n          target_label: __scheme__\n        - action: replace\n          regex: (.+)\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_path\n          target_label: __metrics_path__\n        - action: replace\n          regex: (\\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})\n          replacement: '[$$2]:$$1'\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_port\n          - __meta_kubernetes_pod_ip\n          target_label: __address__\n        - action: replace\n          regex: (\\d+);((([0-9]+?)(\\.|$)){4})\n          replacement: $$2:$$1\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_port\n          - __meta_kubernetes_pod_ip\n          target_label: __address__\n        - action: labelmap\n          regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)\n          replacement: __param_$$1\n        - action:\
    \ labelmap\n          regex: __meta_kubernetes_pod_label_(.+)\n        - action: replace\n          source_labels:\n          - __meta_kubernetes_namespace\n          target_label: namespace\n        - action: replace\n          source_labels:\n          - __meta_kubernetes_pod_name\n          target_label: pod_name\n        - action: drop\n          regex: Pending|Succeeded|Failed|Completed\n          source_labels:\n          - __meta_kubernetes_pod_phase\n      - job_name: ztunnel\n        honor_labels: true\n        kubernetes_sd_configs:\n        - role: pod\n        relabel_configs:\n        - source_labels:\n          - __meta_kubernetes_pod_label_app\n          action: keep\n          regex: ztunnel\n        - action: keep\n          regex: true\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n        - action: replace\n          regex: (https?)\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_scheme\n          target_label: __scheme__\n        - action: replace\n          regex: (.+)\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_path\n          target_label: __metrics_path__\n        - action: replace\n          regex: (\\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})\n          replacement: '[$$2]:$$1'\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_port\n          - __meta_kubernetes_pod_ip\n          target_label: __address__\n        - action: replace\n          regex: (\\d+);((([0-9]+?)(\\.|$)){4})\n          replacement: $$2:$$1\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_port\n          - __meta_kubernetes_pod_ip\n          target_label: __address__\n        - action: labelmap\n          regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)\n          replacement: __param_$$1\n        - action: labelmap\n          regex: __meta_kubernetes_pod_label_(.+)\n        - action: replace\n          source_labels:\n          - __meta_kubernetes_namespace\n          target_label: namespace\n        - action: replace\n          source_labels:\n          - __meta_kubernetes_pod_name\n          target_label: pod_name\n        - action: drop\n          regex: Pending|Succeeded|Failed|Completed\n          source_labels:\n          - __meta_kubernetes_pod_phase\n      - job_name: gateway\n        honor_labels: true\n        kubernetes_sd_configs:\n        - role: pod\n        relabel_configs:\n        - source_labels:\n          - __meta_kubernetes_pod_label_gateway_networking_k8s_io_gateway_name\n          action: keep\n          regex: .+\n        - action: keep\n          regex: true\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n        - action: replace\n          regex: (https?)\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_scheme\n          target_label: __scheme__\n        - action: replace\n          regex: (.+)\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_path\n          target_label: __metrics_path__\n        - action: replace\n          regex: (\\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})\n          replacement: '[$$2]:$$1'\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_port\n          - __meta_kubernetes_pod_ip\n          target_label: __address__\n        - action: replace\n          regex: (\\d+);((([0-9]+?)(\\.|$)){4})\n          replacement: $$2:$$1\n          source_labels:\n          - __meta_kubernetes_pod_annotation_prometheus_io_port\n          - __meta_kubernetes_pod_ip\n          target_label: __address__\n        - action: labelmap\n          regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)\n          replacement: __param_$$1\n        - action: labelmap\n          regex: __meta_kubernetes_pod_label_(.+)\n        - action: replace\n          source_labels:\n          - __meta_kubernetes_namespace\n\
    \          target_label: namespace\n        - action: replace\n          source_labels:\n          - __meta_kubernetes_pod_name\n          target_label: pod_name\n        - action: drop\n          regex: Pending|Succeeded|Failed|Completed\n          source_labels:\n          - __meta_kubernetes_pod_phase\nconnectors:\n  routing/k8sobjects:\n    default_pipelines:\n    - logs/remoteevents\n    table:\n    - context: log\n      statement: route() where attributes[\"k8sobjects\"] == true\n      pipelines:\n      - logs/remoteobjects\nservice:\n  telemetry:\n    logs:\n      encoding: json\n    metrics:\n      readers:\n      - pull:\n          exporter:\n            prometheus:\n              host: 0.0.0.0\n              port: 8888\n  extensions:\n  - health_check\n  pipelines:\n    traces/genai:\n      receivers:\n      - otlp/local\n      - otlp/remote\n      processors:\n      - memory_limiter\n      - resource/cluster_context\n      - k8sattributes\n      - batch\n      exporters:\n      - clickhouse/telemetry\n      - otlp/agentregistry\n    traces/istio:\n      receivers:\n      - otlp/local\n      - otlp/remote\n      processors:\n      - memory_limiter\n      - resource/cluster_context\n      - filter/istio\n      - batch\n      exporters:\n      - clickhouse/telemetry\n    logs/in:\n      receivers:\n      - otlp/remote\n      processors:\n      - memory_limiter\n      - batch\n      exporters:\n      - routing/k8sobjects\n    logs/remoteobjects:\n      receivers:\n      - routing/k8sobjects\n      processors:\n      - memory_limiter\n      - batch\n      exporters:\n      - clickhouse/k8sobjects\n    logs/remoteevents:\n      receivers:\n      - routing/k8sobjects\n      processors:\n      - memory_limiter\n      - batch\n      exporters:\n      - clickhouse/telemetry\n    logs/events:\n      receivers:\n      - otlp/local\n      processors:\n      - memory_limiter\n      - resource/cluster_context\n      - batch\n      exporters:\n      - clickhouse/telemetry\n    metrics/istio:\n      receivers:\n      - prometheus\n      processors:\n      - memory_limiter\n      - filter/istio_metrics\n      - resource/cluster_context\n      - k8sattributes\n      - transform/health_metrics\n      - batch\n      exporters:\n      - clickhouse/metrics\n    metrics/otlp:\n      receivers:\n      - otlp/local\n      - otlp/remote\n      processors:\n      - memory_limiter\n      - batch\n      exporters:\n      - clickhouse/metrics\n"
