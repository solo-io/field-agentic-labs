apiVersion: v1
kind: ConfigMap
metadata:
  name: agentregistry-audit-debug
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-audit-debug
    app.kubernetes.io/component: audit-collector
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 192
        spike_limit_mib: 48
      batch:
        timeout: 1s

    exporters:
      debug:
        verbosity: detailed

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentregistry-audit-debug
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-audit-debug
    app.kubernetes.io/component: audit-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentregistry-audit-debug
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentregistry-audit-debug
        app.kubernetes.io/component: audit-collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.148.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: health
              containerPort: 13133
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: agentregistry-audit-debug
---
apiVersion: v1
kind: Service
metadata:
  name: agentregistry-audit-debug
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-audit-debug
    app.kubernetes.io/component: audit-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentregistry-audit-debug
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
