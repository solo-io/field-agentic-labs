apiVersion: v1
kind: ConfigMap
metadata:
  name: agentregistry-splunk-otel-collector
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-splunk-otel-collector
    app.kubernetes.io/component: audit-splunk-bridge
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      file_storage:
        directory: /var/lib/otelcol/storage
        create_directory: true

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 384
        spike_limit_mib: 96
      resource/audit_metadata:
        attributes:
          - key: cluster.name
            value: ${env:CLUSTER_NAME}
            action: upsert
          - key: deployment.environment
            value: ${env:DEPLOYMENT_ENVIRONMENT}
            action: upsert
      batch:
        timeout: 1s
        send_batch_size: 512
        send_batch_max_size: 1024

    exporters:
      splunk_hec/audit:
        token: ${env:SPLUNK_HEC_TOKEN}
        endpoint: ${env:SPLUNK_HEC_URL}
        index: ${env:SPLUNK_INDEX}
        source: agentregistry
        sourcetype: agentregistry:audit
        disable_compression: false
        timeout: 10s
        tls:
          insecure_skip_verify: false
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 0s
        sending_queue:
          enabled: true
          storage: file_storage
          queue_size: 10000
          num_consumers: 4

    service:
      extensions: [health_check, file_storage]
      pipelines:
        logs/audit:
          receivers: [otlp]
          processors: [memory_limiter, resource/audit_metadata, batch]
          exporters: [splunk_hec/audit]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentregistry-splunk-otel-collector
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-splunk-otel-collector
    app.kubernetes.io/component: audit-splunk-bridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentregistry-splunk-otel-collector
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-splunk-otel-collector
    app.kubernetes.io/component: audit-splunk-bridge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agentregistry-splunk-otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentregistry-splunk-otel-collector
        app.kubernetes.io/component: audit-splunk-bridge
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.148.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/config.yaml
          env:
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentregistry-splunk-hec
                  key: token
            - name: SPLUNK_HEC_URL
              valueFrom:
                secretKeyRef:
                  name: agentregistry-splunk-hec
                  key: url
            - name: SPLUNK_INDEX
              valueFrom:
                secretKeyRef:
                  name: agentregistry-splunk-hec
                  key: index
            - name: CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: agentregistry-audit-metadata
                  key: cluster_name
            - name: DEPLOYMENT_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: agentregistry-audit-metadata
                  key: environment
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: health
              containerPort: 13133
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: storage
              mountPath: /var/lib/otelcol/storage
      volumes:
        - name: config
          configMap:
            name: agentregistry-splunk-otel-collector
        - name: storage
          persistentVolumeClaim:
            claimName: agentregistry-splunk-otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: agentregistry-splunk-otel-collector
  namespace: agentregistry-system
  labels:
    app.kubernetes.io/name: agentregistry-splunk-otel-collector
    app.kubernetes.io/component: audit-splunk-bridge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentregistry-splunk-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
