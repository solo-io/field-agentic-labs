apiVersion: v1
data:
  relay: |-
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    exporters:
      clickhouse/k8sobjects:
        endpoint: "tcp://${file:/etc/clickhouse-config/address}:${file:/etc/clickhouse-config/port}?dial_timeout=10s&enable_json_type=1"
        json: true
        database: "${file:/etc/clickhouse-config/database}"
        username: "${file:/etc/clickhouse-config/username}"
        password: "${file:/etc/clickhouse-config/password}"
        async_insert: true
        ttl: 2160h
        compress: lz4
        create_schema: false
        logs_table_name: otel_k8sobjects_json
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
      clickhouse/telemetry:
        endpoint: "tcp://${file:/etc/clickhouse-config/address}:${file:/etc/clickhouse-config/port}?dial_timeout=10s&enable_json_type=1"
        json: true
        database: "${file:/etc/clickhouse-config/database}"
        username: "${file:/etc/clickhouse-config/username}"
        password: "${file:/etc/clickhouse-config/password}"
        async_insert: true
        ttl: 2160h
        compress: lz4
        create_schema: false
        logs_table_name: otel_logs_json
        traces_table_name: otel_traces_json
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
      clickhouse/metrics:
        endpoint: "tcp://${file:/etc/clickhouse-config/address}:${file:/etc/clickhouse-config/port}?dial_timeout=10s&enable_json_type=1"
        json: true
        database: "${file:/etc/clickhouse-config/database}"
        username: "${file:/etc/clickhouse-config/username}"
        password: "${file:/etc/clickhouse-config/password}"
        async_insert: true
        ttl: 2160h
        compress: lz4
        create_schema: false
        timeout: 10s
        metrics_tables:
          gauge:
            name: "otel_metrics_gauge"
          sum:
            name: "otel_metrics_sum"
          summary:
            name: "otel_metrics_summary"
          histogram:
            name: "otel_metrics_histogram"
          exponential_histogram:
            name: "otel_metrics_exp_histogram"
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    processors:
      batch:
        send_batch_max_size: 3000
        send_batch_size: 2000
        timeout: 600ms

      memory_limiter:
        check_interval: 1s
        limit_percentage: 85
        spike_limit_percentage: 10

      resource/cluster_context:
        attributes:
          - key: "cluster_name"
            action: insert
            value: "mgmt-cluster"

      attributes/k8sobjects:
        actions:
          - key: k8sobjects
            value: true
            action: upsert

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      # Filter to keep only GenAI instrumentations for kagent and agentgateway pipelines.
      # Enable traces.verbose to disable this filter.
      filter/genai:
        traces:
          span:
            - 'not(IsMatch(instrumentation_scope.name, "^gcp\\.vertex\\.agent$") or IsMatch(instrumentation_scope.name, "^opentelemetry\\.instrumentation\\.openai\\.v1$") or IsMatch(instrumentation_scope.name, "^opentelemetry\\.instrumentation\\.anthropic$") or IsMatch(instrumentation_scope.name, "^opentelemetry\\.instrumentation\\.google-generativeai$") or IsMatch(instrumentation_scope.name, "^opentelemetry\\.instrumentation\\.ollama$") or IsMatch(instrumentation_scope.name, "^opentelemetry\\.instrumentation\\.vertexai$") or IsMatch(instrumentation_scope.name, "^langsmith$") or IsMatch(instrumentation_scope.name, "^kagent-tools$") or IsMatch(instrumentation_scope.name, "^kagent-tools/mcp$") or IsMatch(instrumentation_scope.name, "^agentgateway$"))'
      # Filter to keep only Istio traces for mesh pipelines.
      filter/istio:
        error_mode: ignore
        traces:
          span:
            - 'not(IsMatch(instrumentation_scope.name, "^envoy") or IsMatch(instrumentation_scope.name, "^ztunnel"))'

      # Filter to keep only important Istio metrics to reduce data volume
      filter/istio_metrics:
        metrics:
          include:
            match_type: strict
            metric_names:
              - istio_requests_total
              - istio_request_duration_milliseconds
              - istio_tcp_sent_bytes_total
              - istio_tcp_received_bytes_total
              - istio_tcp_connections_opened_total
              - istio_tcp_connections_failed_total
              # Waypoint health metrics
              - envoy_cluster_membership_healthy
              - envoy_cluster_membership_total
              - envoy_cluster_outlier_detection_ejections_active
              # Ztunnel health metrics
              - istio_outlier_detection_endpoints
              - istio_outlier_detection_endpoints_unhealthy
              # Istiod control plane metrics
              - pilot_proxy_convergence_time
              - pilot_info
              - pilot_xds_pushes
              - pilot_xds_push_time
      transform/health_metrics:
        metric_statements:
        # add reporter labels to waypoint/gateway health metrics
        - context: datapoint
          conditions:
          - metric.name == "envoy_cluster_membership_healthy" or metric.name == "envoy_cluster_membership_total" or metric.name == "envoy_cluster_outlier_detection_ejections_active"
          statements:
          - set(attributes["reporter_workload"], resource.attributes["k8s.deployment.name"]) where resource.attributes["k8s.deployment.name"] != nil
          - set(attributes["reporter_namespace"], resource.attributes["k8s.namespace.name"])
          - set(attributes["reporter_cluster"], resource.attributes["cluster_name"])
        # add reporter labels to ztunnel health metrics
        - context: datapoint
          conditions:
          - metric.name == "istio_outlier_detection_endpoints" or metric.name == "istio_outlier_detection_endpoints_unhealthy"
          statements:
          - set(attributes["reporter_workload"], resource.attributes["k8s.daemonset.name"]) where resource.attributes["k8s.daemonset.name"] != nil
          - set(attributes["reporter_namespace"], resource.attributes["k8s.namespace.name"])
          - set(attributes["reporter_cluster"], resource.attributes["cluster_name"])

    receivers:
      otlp/remote:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4316
            max_recv_msg_size_mib: 32
      # Local OTLP receiver for local cluster telemetry.
      otlp/local:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 32

      # Prometheus receiver for scraping local Istio workload metrics
      prometheus:
        config:
          global:
            evaluation_interval: 1m
            scrape_interval: 15s
            scrape_timeout: 15s
          scrape_configs:
            # Scrape istiod control plane metrics
            - job_name: istiod
              honor_labels: true
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # Filter for istiod pods using the istio label (works with both Helm and operator installs)
                - action: keep
                  regex: pilot|istiod
                  source_labels:
                    - __meta_kubernetes_pod_label_istio
                - action: keep
                  regex: true
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                - action: replace
                  regex: (https?)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scheme
                  target_label: __scheme__
                - action: replace
                  regex: (.+)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  target_label: __metrics_path__
                - action: replace
                  regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
                  replacement: '[$$2]:$$1'
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                    - __meta_kubernetes_pod_ip
                  target_label: __address__
                - action: replace
                  regex: (\d+);((([0-9]+?)(\.|$)){4})
                  replacement: $$2:$$1
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                    - __meta_kubernetes_pod_ip
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
                  replacement: __param_$$1
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - action: replace
                  source_labels:
                    - __meta_kubernetes_namespace
                  target_label: namespace
                - action: replace
                  source_labels:
                    - __meta_kubernetes_pod_name
                  target_label: pod_name
                - action: drop
                  regex: Pending|Succeeded|Failed|Completed
                  source_labels:
                    - __meta_kubernetes_pod_phase
            # Scrape ztunnel metrics (ambient mode L4 proxy)
            - job_name: ztunnel
              honor_labels: true
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: 'ztunnel'
                - action: keep
                  regex: true
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                - action: replace
                  regex: (https?)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scheme
                  target_label: __scheme__
                - action: replace
                  regex: (.+)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  target_label: __metrics_path__
                - action: replace
                  regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
                  replacement: '[$$2]:$$1'
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                    - __meta_kubernetes_pod_ip
                  target_label: __address__
                - action: replace
                  regex: (\d+);((([0-9]+?)(\.|$)){4})
                  replacement: $$2:$$1
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                    - __meta_kubernetes_pod_ip
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
                  replacement: __param_$$1
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - action: replace
                  source_labels:
                    - __meta_kubernetes_namespace
                  target_label: namespace
                - action: replace
                  source_labels:
                    - __meta_kubernetes_pod_name
                  target_label: pod_name
                - action: drop
                  regex: Pending|Succeeded|Failed|Completed
                  source_labels:
                    - __meta_kubernetes_pod_phase
            # Scrape waypoint/east-west gateway proxy metrics
            - job_name: gateway
              honor_labels: true
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # Keep pods that have the gateway.networking.k8s.io/gateway-name label (identifies Waypoint/Gateway proxies)
                - source_labels: [__meta_kubernetes_pod_label_gateway_networking_k8s_io_gateway_name]
                  action: keep
                  regex: '.+'
                - action: keep
                  regex: true
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                - action: replace
                  regex: (https?)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scheme
                  target_label: __scheme__
                - action: replace
                  regex: (.+)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  target_label: __metrics_path__
                - action: replace
                  regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
                  replacement: '[$$2]:$$1'
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                    - __meta_kubernetes_pod_ip
                  target_label: __address__
                - action: replace
                  regex: (\d+);((([0-9]+?)(\.|$)){4})
                  replacement: $$2:$$1
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                    - __meta_kubernetes_pod_ip
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
                  replacement: __param_$$1
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - action: replace
                  source_labels:
                    - __meta_kubernetes_namespace
                  target_label: namespace
                - action: replace
                  source_labels:
                    - __meta_kubernetes_pod_name
                  target_label: pod_name
                - action: drop
                  regex: Pending|Succeeded|Failed|Completed
                  source_labels:
                    - __meta_kubernetes_pod_phase

    # Connector to route incoming logs based on k8sobjects attribute
    connectors:
      routing/k8sobjects:
        default_pipelines:
          - logs/remoteevents
        table:
          - context: log
            statement: route() where attributes["k8sobjects"] == true
            pipelines:
              - logs/remoteobjects

    service:
      telemetry:
        logs:
          encoding: json
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: '0.0.0.0'
                  port: 8888
      extensions:
        - health_check
      pipelines:
        # Pipeline for GenAI traces.
        traces/genai:
          receivers:
            - otlp/local
            - otlp/remote
          processors:
            - memory_limiter
            - resource/cluster_context
            - k8sattributes
            - batch
          exporters:
            - clickhouse/telemetry
        # Pipeline for Istio traces from mesh workloads.
        traces/istio:
          receivers:
            - otlp/local
            - otlp/remote
          processors:
            - memory_limiter
            - resource/cluster_context
            - filter/istio
            - batch
          exporters:
            - clickhouse/telemetry
        # Pipeline for incoming logs from workload clusters (k8sobjects + events)
        # Routes to k8sobjects or events pipelines based on attribute
        logs/in:
          receivers:
            - otlp/remote
          processors:
            - memory_limiter
            - batch
          exporters:
            - routing/k8sobjects
        # Pipeline for remote k8sobjects (from workload clusters)
        logs/remoteobjects:
          receivers:
            - routing/k8sobjects
          processors:
            - memory_limiter
            - batch
          exporters:
            - clickhouse/k8sobjects
        # Pipeline for remote events (from workload clusters)
        logs/remoteevents:
          receivers:
            - routing/k8sobjects
          processors:
            - memory_limiter
            - batch
          exporters:
            - clickhouse/telemetry
        # Pipeline for local event collection
        logs/events:
          receivers:
            - otlp/local
          processors:
            - memory_limiter
            - resource/cluster_context
            - batch
          exporters:
            - clickhouse/telemetry
        # Pipeline for Istio metrics from local Prometheus scraping
        metrics/istio:
          receivers:
            - prometheus
          processors:
            - memory_limiter
            - filter/istio_metrics
            - resource/cluster_context
            - k8sattributes
            - transform/health_metrics
            - batch
          exporters:
            - clickhouse/metrics
        # Pipeline for OTLP metrics (from workload clusters and local)
        metrics/otlp:
          receivers:
            - otlp/local
            - otlp/remote
          processors:
            - memory_limiter
            - batch
          exporters:
            - clickhouse/metrics
kind: ConfigMap
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"v1","data":{"relay":"extensions:\n  health_check:\n    endpoint: ${env:MY_POD_IP}:13133\nexporters:\n  clickhouse/k8sobjects:\n    endpoint: tcp://kagent-mgmt-clickhouse.kagent.svc.cluster.local:9000?dial_timeout=10s\u0026enable_json_type=1\n    json: true\n    database: \"platformdb\"\n    username: \"default\"\n    password: \"password\"\n    async_insert: true\n    ttl: 2160h\n    compress: lz4\n    create_schema: false\n    logs_table_name: otel_k8sobjects_json\n    timeout: 10s\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\n  clickhouse/telemetry:\n    endpoint: tcp://kagent-mgmt-clickhouse.kagent.svc.cluster.local:9000?dial_timeout=10s\u0026enable_json_type=1\n    json: true\n    database: \"platformdb\"\n    username: \"default\"\n    password: \"password\"\n    async_insert: true\n    ttl: 2160h\n    compress: lz4\n    create_schema: false\n    logs_table_name: otel_logs_json\n    traces_table_name: otel_traces_json\n    timeout: 10s\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\n  clickhouse/metrics:\n    endpoint: tcp://kagent-mgmt-clickhouse.kagent.svc.cluster.local:9000?dial_timeout=10s\u0026enable_json_type=1\n    json: true\n    database: \"platformdb\"\n    username: \"default\"\n    password: \"password\"\n    async_insert: true\n    ttl: 2160h\n    compress: lz4\n    create_schema: false\n    timeout: 10s\n    metrics_tables:\n      gauge:\n        name: \"otel_metrics_gauge\"\n      sum:\n        name: \"otel_metrics_sum\"\n      summary:\n        name: \"otel_metrics_summary\"\n      histogram:\n        name: \"otel_metrics_histogram\"\n      exponential_histogram:\n        name: \"otel_metrics_exp_histogram\"\n    retry_on_failure:\n      enabled: true\n      initial_interval: 5s\n      max_interval: 30s\n      max_elapsed_time: 300s\nprocessors:\n  batch:\n    send_batch_max_size: 3000\n    send_batch_size: 2000\n    timeout: 600ms\n\n  memory_limiter:\n    check_interval: 1s\n    limit_percentage: 85\n    spike_limit_percentage: 10\n\n  resource/cluster_context:\n    attributes:\n      - key: \"cluster_name\"\n        action: insert\n        value: \"mgmt-cluster\"\n\n  attributes/k8sobjects:\n    actions:\n      - key: k8sobjects\n        value: true\n        action: upsert\n\n  k8sattributes:\n    auth_type: \"serviceAccount\"\n    passthrough: false\n    extract:\n      metadata:\n        - k8s.pod.name\n        - k8s.pod.uid\n        - k8s.deployment.name\n        - k8s.daemonset.name\n        - k8s.namespace.name\n        - k8s.node.name\n        - k8s.pod.start_time\n    pod_association:\n      - sources:\n          - from: resource_attribute\n            name: k8s.pod.ip\n      - sources:\n          - from: resource_attribute\n            name: k8s.pod.uid\n      - sources:\n          - from: connection\n  # Filter to keep only GenAI instrumentations for kagent and agentgateway pipelines.\n  # Enable traces.verbose to disable this filter.\n  filter/genai:\n    traces:\n      span:\n        - 'not(IsMatch(instrumentation_scope.name, \"^gcp\\\\.vertex\\\\.agent$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.openai\\\\.v1$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.anthropic$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.google-generativeai$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.ollama$\") or IsMatch(instrumentation_scope.name, \"^opentelemetry\\\\.instrumentation\\\\.vertexai$\") or IsMatch(instrumentation_scope.name, \"^langsmith$\") or IsMatch(instrumentation_scope.name, \"^kagent-tools$\") or IsMatch(instrumentation_scope.name, \"^kagent-tools/mcp$\") or IsMatch(instrumentation_scope.name, \"^agentgateway$\"))'\n  # Filter to keep only Istio traces for mesh pipelines.\n  filter/istio:\n    error_mode: ignore\n    traces:\n      span:\n        - 'not(IsMatch(instrumentation_scope.name, \"^envoy\") or IsMatch(instrumentation_scope.name, \"^ztunnel\"))'\n\n  # Filter to keep only important Istio metrics to reduce data volume\n  filter/istio_metrics:\n    metrics:\n      include:\n        match_type: strict\n        metric_names:\n          - istio_requests_total\n          - istio_request_duration_milliseconds\n          - istio_tcp_sent_bytes_total\n          - istio_tcp_received_bytes_total\n          - istio_tcp_connections_opened_total\n          - istio_tcp_connections_closed_total\n          # Waypoint health metrics\n          - envoy_cluster_membership_healthy\n          - envoy_cluster_membership_total\n          - envoy_cluster_outlier_detection_ejections_active\n          # Ztunnel health metrics\n          - istio_outlier_detection_endpoints\n          - istio_outlier_detection_endpoints_unhealthy\n          # Istiod control plane metrics\n          - pilot_proxy_convergence_time\n          - pilot_info\n          - pilot_xds_pushes\n          - pilot_xds_push_time\n  transform/health_metrics:\n    metric_statements:\n    # add reporter labels to waypoint/gateway health metrics\n    - context: datapoint\n      conditions:\n      - metric.name == \"envoy_cluster_membership_healthy\" or metric.name == \"envoy_cluster_membership_total\" or metric.name == \"envoy_cluster_outlier_detection_ejections_active\"\n      statements:\n      - set(attributes[\"reporter_workload\"], resource.attributes[\"k8s.deployment.name\"]) where resource.attributes[\"k8s.deployment.name\"] != nil\n      - set(attributes[\"reporter_namespace\"], resource.attributes[\"k8s.namespace.name\"])\n      - set(attributes[\"reporter_cluster\"], resource.attributes[\"cluster_name\"])\n    # add reporter labels to ztunnel health metrics\n    - context: datapoint\n      conditions:\n      - metric.name == \"istio_outlier_detection_endpoints\" or metric.name == \"istio_outlier_detection_endpoints_unhealthy\"\n      statements:\n      - set(attributes[\"reporter_workload\"], resource.attributes[\"k8s.daemonset.name\"]) where resource.attributes[\"k8s.daemonset.name\"] != nil\n      - set(attributes[\"reporter_namespace\"], resource.attributes[\"k8s.namespace.name\"])\n      - set(attributes[\"reporter_cluster\"], resource.attributes[\"cluster_name\"])\n\nreceivers:\n  # Gateway: OTLP receiver for incoming telemetry from remote clusters\n  otlp/remote:\n    protocols:\n      grpc:\n        endpoint: 0.0.0.0:4316\n  # Local OTLP receiver for local cluster telemetry\n  otlp/local:\n    protocols:\n      grpc:\n        endpoint: 0.0.0.0:4317\n\n  # Prometheus receiver for scraping local Istio workload metrics\n  prometheus:\n    config:\n      global:\n        evaluation_interval: 1m\n        scrape_interval: 15s\n        scrape_timeout: 15s\n      scrape_configs:\n        # Scrape istiod control plane metrics\n        - job_name: istiod\n          honor_labels: true\n          kubernetes_sd_configs:\n            - role: pod\n          relabel_configs:\n            # Filter for istiod pods using the istio label (works with both Helm and operator installs)\n            - action: keep\n              regex: pilot|istiod\n              source_labels:\n                - __meta_kubernetes_pod_label_istio\n            - action: keep\n              regex: true\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n            - action: replace\n              regex: (https?)\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_scheme\n              target_label: __scheme__\n            - action: replace\n              regex: (.+)\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_path\n              target_label: __metrics_path__\n            - action: replace\n              regex: (\\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})\n              replacement: '[$$2]:$$1'\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_port\n                - __meta_kubernetes_pod_ip\n              target_label: __address__\n            - action: replace\n              regex: (\\d+);((([0-9]+?)(\\.|$)){4})\n              replacement: $$2:$$1\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_port\n                - __meta_kubernetes_pod_ip\n              target_label: __address__\n            - action: labelmap\n              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)\n              replacement: __param_$$1\n            - action: labelmap\n              regex: __meta_kubernetes_pod_label_(.+)\n            - action: replace\n              source_labels:\n                - __meta_kubernetes_namespace\n              target_label: namespace\n            - action: replace\n              source_labels:\n                - __meta_kubernetes_pod_name\n              target_label: pod_name\n            - action: drop\n              regex: Pending|Succeeded|Failed|Completed\n              source_labels:\n                - __meta_kubernetes_pod_phase\n        # Scrape ztunnel metrics (ambient mode L4 proxy)\n        - job_name: ztunnel\n          honor_labels: true\n          kubernetes_sd_configs:\n            - role: pod\n          relabel_configs:\n            - source_labels: [__meta_kubernetes_pod_label_app]\n              action: keep\n              regex: 'ztunnel'\n            - action: keep\n              regex: true\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n            - action: replace\n              regex: (https?)\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_scheme\n              target_label: __scheme__\n            - action: replace\n              regex: (.+)\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_path\n              target_label: __metrics_path__\n            - action: replace\n              regex: (\\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})\n              replacement: '[$$2]:$$1'\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_port\n                - __meta_kubernetes_pod_ip\n              target_label: __address__\n            - action: replace\n              regex: (\\d+);((([0-9]+?)(\\.|$)){4})\n              replacement: $$2:$$1\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_port\n                - __meta_kubernetes_pod_ip\n              target_label: __address__\n            - action: labelmap\n              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)\n              replacement: __param_$$1\n            - action: labelmap\n              regex: __meta_kubernetes_pod_label_(.+)\n            - action: replace\n              source_labels:\n                - __meta_kubernetes_namespace\n              target_label: namespace\n            - action: replace\n              source_labels:\n                - __meta_kubernetes_pod_name\n              target_label: pod_name\n            - action: drop\n              regex: Pending|Succeeded|Failed|Completed\n              source_labels:\n                - __meta_kubernetes_pod_phase\n        # Scrape waypoint/east-west gateway proxy metrics\n        - job_name: gateway\n          honor_labels: true\n          kubernetes_sd_configs:\n            - role: pod\n          relabel_configs:\n            # Keep pods that have the gateway.networking.k8s.io/gateway-name label (identifies Waypoint/Gateway proxies)\n            - source_labels: [__meta_kubernetes_pod_label_gateway_networking_k8s_io_gateway_name]\n              action: keep\n              regex: '.+'\n            - action: keep\n              regex: true\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n            - action: replace\n              regex: (https?)\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_scheme\n              target_label: __scheme__\n            - action: replace\n              regex: (.+)\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_path\n              target_label: __metrics_path__\n            - action: replace\n              regex: (\\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})\n              replacement: '[$$2]:$$1'\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_port\n                - __meta_kubernetes_pod_ip\n              target_label: __address__\n            - action: replace\n              regex: (\\d+);((([0-9]+?)(\\.|$)){4})\n              replacement: $$2:$$1\n              source_labels:\n                - __meta_kubernetes_pod_annotation_prometheus_io_port\n                - __meta_kubernetes_pod_ip\n              target_label: __address__\n            - action: labelmap\n              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)\n              replacement: __param_$$1\n            - action: labelmap\n              regex: __meta_kubernetes_pod_label_(.+)\n            - action: replace\n              source_labels:\n                - __meta_kubernetes_namespace\n              target_label: namespace\n            - action: replace\n              source_labels:\n                - __meta_kubernetes_pod_name\n              target_label: pod_name\n            - action: drop\n              regex: Pending|Succeeded|Failed|Completed\n              source_labels:\n                - __meta_kubernetes_pod_phase\n\n# Connector to route incoming logs based on k8sobjects attribute\nconnectors:\n  routing/k8sobjects:\n    default_pipelines:\n      - logs/remoteevents\n    table:\n      - context: log\n        statement: route() where attributes[\"k8sobjects\"] == true\n        pipelines:\n          - logs/remoteobjects\n\nservice:\n  telemetry:\n    logs:\n      encoding: json\n    metrics:\n      readers:\n      - pull:\n          exporter:\n            prometheus:\n              host: '0.0.0.0'\n              port: 8888\n  extensions:\n    - health_check\n  pipelines:\n    # Pipeline for GenAI traces.\n    traces/genai:\n      receivers:\n        - otlp/local\n        - otlp/remote\n      processors:\n        - memory_limiter\n        - resource/cluster_context\n        - k8sattributes\n        - batch\n      exporters:\n        - clickhouse/telemetry\n    # Pipeline for Istio traces from mesh workloads.\n    traces/istio:\n      receivers:\n        - otlp/local\n        - otlp/remote\n      processors:\n        - memory_limiter\n        - resource/cluster_context\n        - filter/istio\n        - batch\n      exporters:\n        - clickhouse/telemetry\n    # Pipeline for incoming logs from workload clusters (k8sobjects + events)\n    # Routes to k8sobjects or events pipelines based on attribute\n    logs/in:\n      receivers:\n        - otlp/remote\n      processors:\n        - memory_limiter\n        - batch\n      exporters:\n        - routing/k8sobjects\n    # Pipeline for remote k8sobjects (from workload clusters)\n    logs/remoteobjects:\n      receivers:\n        - routing/k8sobjects\n      processors:\n        - memory_limiter\n        - batch\n      exporters:\n        - clickhouse/k8sobjects\n    # Pipeline for remote events (from workload clusters)\n    logs/remoteevents:\n      receivers:\n        - routing/k8sobjects\n      processors:\n        - memory_limiter\n        - batch\n      exporters:\n        - clickhouse/telemetry\n    # Pipeline for local event collection\n    logs/events:\n      receivers:\n        - otlp/local\n      processors:\n        - memory_limiter\n        - resource/cluster_context\n        - batch\n      exporters:\n        - clickhouse/telemetry\n    # Pipeline for Istio metrics from local Prometheus scraping\n    metrics/istio:\n      receivers:\n        - prometheus\n      processors:\n        - memory_limiter\n        - filter/istio_metrics\n        - resource/cluster_context\n        - k8sattributes\n        - transform/health_metrics\n        - batch\n      exporters:\n        - clickhouse/metrics\n    # Pipeline for OTLP metrics (from workload clusters and local)\n    metrics/otlp:\n      receivers:\n        - otlp/local\n        - otlp/remote\n      processors:\n        - memory_limiter\n        - batch\n      exporters:\n        - clickhouse/metrics"},"kind":"ConfigMap","metadata":{"annotations":{"meta.helm.sh/release-name":"kagent-mgmt","meta.helm.sh/release-namespace":"kagent"},"creationTimestamp":"2026-03-13T19:00:28Z","labels":{"app.kubernetes.io/managed-by":"Helm"},"name":"solo-enterprise-telemetry-collector-config","namespace":"kagent","resourceVersion":"1780081748773839006","uid":"5e52d425-2870-447c-804f-f373b8174068"}}
