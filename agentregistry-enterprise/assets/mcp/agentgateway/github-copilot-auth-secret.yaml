# AgentRegistry Secret used by the backend auth demo.
#
# The Virtual runtime backend auth path expects an Authorization data key. The
# value is write-only in AgentRegistry; get/list responses show only dataKeys.
# Apply with envsubst.
apiVersion: ar.dev/v1alpha1
kind: Secret
metadata:
  name: github-copilot-upstream-auth
spec:
  type: Opaque
  stringData:
    Authorization: "Bearer ${GITHUB_COPILOT_MCP_TOKEN}"
