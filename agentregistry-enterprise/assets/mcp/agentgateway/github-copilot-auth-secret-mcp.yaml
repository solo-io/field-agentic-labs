# Remote MCP catalog entry used by the backend auth demo.
#
# Notice this MCPServer has no spec.remote.headers. The upstream Authorization
# credential comes from Deployment.spec.runtimeConfig.backend.auth.secretRef.
apiVersion: ar.dev/v1alpha1
kind: MCPServer
metadata:
  name: github-copilot-auth-secret-mcp
  tag: latest
spec:
  title: GitHub Copilot Auth Secret MCP
  description: GitHub Copilot MCP exposed through Agentgateway with backend auth from an AgentRegistry Secret
  remote:
    type: streamable-http
    url: https://api.githubcopilot.com/mcp
