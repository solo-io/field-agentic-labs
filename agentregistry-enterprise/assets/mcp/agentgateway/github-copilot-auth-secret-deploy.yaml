# Deploy the auth-secret demo MCP to the Virtual runtime.
#
# Agentregistry resolves Secret/github-copilot-upstream-auth, mirrors it into
# the install namespace as a Kubernetes Secret, and wires the generated
# EnterpriseAgentgatewayBackend policy to that mirror.
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: github-copilot-auth-secret-agw
spec:
  targetRef:
    kind: MCPServer
    name: github-copilot-auth-secret-mcp
    tag: latest
  runtimeRef:
    kind: Runtime
    name: virtual-default
  runtimeConfig:
    route:
      pathSuffix: /github-copilot-auth-secret
    backend:
      auth:
        secretRef:
          name: github-copilot-upstream-auth
