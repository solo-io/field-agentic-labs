# Agent catalog entry for the k8shelper Anthropic variant.
#
# Build + push the image yourself before applying this manifest. From the
# workshop root:
#
# cd agentregistry-enterprise/assets/k8shelper-anthropic
# export K8SHELPER_IMAGE="<your-registry>/<your-repo>/k8shelperanthropic:latest"
# docker buildx build --platform linux/amd64 -t "${K8SHELPER_IMAGE}" --push .
#
# Then render this manifest with envsubst and apply:
#
# envsubst < assets/providers/kagent/anthropicagent/k8shelperanthropic.yaml | arctl apply -f -
#
# `<your-registry>/<your-repo>` is whatever container registry the cluster
# nodes can pull from (Docker Hub, GHCR, ECR, GAR, ACR, etc.).
apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: k8shelperanthropic
  tag: "1.0.0"
spec:
  title: k8shelperanthropic
  description: "Kubernetes helper agent deployed through the kagent runtime (Anthropic/Claude)"
  modelProvider: anthropic
  modelName: claude-sonnet-4-6
  source:
    image: ${K8SHELPER_IMAGE}
  mcpServers:
    - kind: MCPServer
      name: github-copilot-mcp-server
