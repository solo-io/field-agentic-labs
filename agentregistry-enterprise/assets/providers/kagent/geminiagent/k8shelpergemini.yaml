apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: k8shelper
  tag: "1.0.0"
spec:
  title: k8shelper
  description: "Kubernetes helper agent deployed through the kagent runtime"
  modelProvider: gemini
  modelName: gemini-3.5-flash
  source:
    image: ${K8SHELPER_IMAGE}
    # Concrete example (after push to Artifact Registry):
    # image: northamerica-northeast1-docker.pkg.dev/field-engineering-us/mlevan-images/k8shelpergemini:gemini-3.5-flash
  mcpServers:
    - kind: MCPServer
      name: github-copilot-mcp-server
