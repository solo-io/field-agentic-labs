apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-obo-proxy
  namespace: agentgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-obo-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-obo-proxy
    spec:
      containers:
        - name: proxy
          image: python:3.13-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - cd /app && pip install --no-cache-dir -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8080
          env:
            - name: TENANT_ID
              value: "${TENANT_ID}"
            - name: EXPECTED_AUDIENCES
              value: "${KAGENT_BACKEND_CLIENT_ID},api://${KAGENT_BACKEND_CLIENT_ID}"
            - name: ANTHROPIC_MODEL
              value: "claude-haiku-4-5-20251001"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: Authorization
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: code
              mountPath: /app
      volumes:
        - name: code
          configMap:
            name: llm-obo-proxy-code
---
apiVersion: v1
kind: Service
metadata:
  name: llm-obo-proxy
  namespace: agentgateway-system
spec:
  selector:
    app.kubernetes.io/name: llm-obo-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
